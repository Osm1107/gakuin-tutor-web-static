<html>
  <head>
    <script>
      // ----------------------------------------------------
      // Streamlit Component Protocol Implementation
      // ----------------------------------------------------
      function sendMessage(type, data) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: type,
            ...data,
          },
          "*"
        );
      }

      function setComponentValue(value) {
        sendMessage("streamlit:setComponentValue", { value: value });
      }

      function setFrameHeight(height) {
        sendMessage("streamlit:setFrameHeight", { height: height });
      }

      // Signal that the component is ready
      function notifyReady() {
        sendMessage("streamlit:componentReady", { apiVersion: 1 });
      }
      
      // Initialize after load
      window.addEventListener("load", function() {
          notifyReady();
          setFrameHeight(100); // Initial height
      });
      // ----------------------------------------------------
    </script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <!-- 
      We get the Site Key from the URL query params/args if passed, 
      BUT simplest way for static component is to hardcode or 
      let Streamlit pass it via args. 
      However, without React/Build, reading args is tricky.
      
      Simplification: We will Read args from window.location or similar? No.
      The simplest way without a build step to handle dynamic arguments in a "Plain HTML" 
      component is to parse the arguments sent by Streamlit in the 'streamlit:render' event.
    -->
    <script>
        var siteKey = "";
        
        // Listen for Streamlit render events to get arguments (like site_key)
        window.addEventListener("message", function(event) {
             if (event.data.type === "streamlit:render") {
                 // event.data.args is the dictionary passed from Python
                 var newSiteKey = event.data.args.site_key;
                 if (newSiteKey && newSiteKey !== siteKey) {
                     siteKey = newSiteKey;
                     renderRecaptcha();
                 }
                 // Update height if needed
                 setFrameHeight(100);
             }
        });

        function renderRecaptcha() {
            var container = document.getElementById("recaptcha-container");
            container.innerHTML = ""; // Clear previous
            
            // Create div with data attributes
            var div = document.createElement("div");
            div.className = "g-recaptcha";
            div.setAttribute("data-sitekey", siteKey);
            div.setAttribute("data-callback", "onSuccessCallback");
            
            container.appendChild(div);
            
            // Explicitly render if library is loaded
            if (window.grecaptcha) {
                grecaptcha.render(div, {
                    'sitekey': siteKey,
                    'callback': onSuccessCallback
                });
            }
        }

        // Global callback name as string for data-callback
        window.onSuccessCallback = function(token) {
            // Send token back to Streamlit
            setComponentValue(token);
        }
    </script>

    <div id="recaptcha-container" style="display: flex; justify-content: center;"></div>
  </body>
</html>
